; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Settings shared by every build. The two concrete envs below pick the vehicle.
[env]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

; can reduce this if there are issues
upload_speed = 921600

; The Arduino-ESP32 framework injects -std=gnu++11, which overrides anything we
; add. Strip it first, then set our own standard so C++17 is actually applied.
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17

; Hopcopter IMU: SparkFun 9DoF ICM-20948 (Qwiic / I2C).
; Hopcopter rangefinders: 2x VL53L0X ToF (I2C). The Adafruit library is used
; over alternatives for its non-blocking isRangeComplete()/readRangeResult()
; pair — a blocking range read would stall the control loop.
; Harmless on the robosub build: the linker drops what main.cpp never references.
lib_deps =
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.2
    adafruit/Adafruit_VL53L0X@^1.2

lib_ldf_mode = deep+

; Hopcopter — onboard Mahony fusion from the I2C IMU. The default:
;   pio run            /  pio run -t upload
[env:hopcopter]

; Robosub — external pose from the Jetson EKF over the ROS link:
;   pio run -e robosub /  pio run -e robosub -t upload
[env:robosub]
build_flags =
    ${env.build_flags}
    -D VEHICLE_ROBOSUB
